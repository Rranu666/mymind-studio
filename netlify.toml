[build]
  publish = "."

# ── Clean URL redirects ──────────────────────────────────────────────────────
# These let /blog work instead of /blog.html on the live site

[[redirects]]
  from = "/admin"
  to   = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/blog"
  to   = "/blog.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to   = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to   = "/terms.html"
  status = 200

[[redirects]]
  from = "/how-it-works"
  to   = "/explainer-video.html"
  status = 200

# ── Security headers ─────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# ── Cache static assets ──────────────────────────────────────────────────────

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Forms ────────────────────────────────────────────────────────────────────
# Netlify Forms are auto-detected from HTML — no extra config needed here.
# See the `data-netlify="true"` attributes in index.html contact forms.
